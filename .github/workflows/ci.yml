name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: DB parity
        if: ${{ env.DATABASE_URL != '' || env.DIRECT_URL != '' }}
        run: npm run db:verify:parity

      - name: DB parity skipped
        if: ${{ env.DATABASE_URL == '' && env.DIRECT_URL == '' }}
        run: echo "Skipping db parity because DATABASE_URL or DIRECT_URL is not configured."
